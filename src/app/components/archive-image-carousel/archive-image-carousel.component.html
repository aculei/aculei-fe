<div
  class="relative w-full h-full flex justify-center items-center noselect font-mono_lite text-xs"
>
  <div
    class="relative max-w-[45%] min-w-[30%] flex justify-center items-center"
  >
    <div class="relative inline-block">
      <div
        *ngIf="isLoading()"
        class="absolute inset-0 z-30 bg-gradient-to-r from-gray-300/20 via-gray-300/40 to-gray-300/20 bg-[length:200%_100%] animate-[shimmer_1.2s_infinite]"
      ></div>

      <img
        oncontextmenu="return false;"
        ngOptimizedImage
        loading="lazy"
        (load)="onImageLoad()"
        (click)="handleImageClick($event)"
        class="z-40 block max-h-[80vh] max-w-full object-contain transition-opacity duration-200"
        [class.opacity-0]="isLoading()"
        [class.opacity-100]="!isLoading()"
        [src]="imageBaseUrl + images()?.[imageCurrentIndex()!]?.image_name"
      />
    </div>

    <div class="absolute inset-0 flex">
      <div class="w-2/5 cursor-prev z-50" (click)="prevImage()"></div>
      <div class="w-1/5 cursor-close z-50" (click)="closeImage()"></div>
      <div class="w-2/5 cursor-next z-50" (click)="nextImage()"></div>
    </div>
  </div>
</div>
